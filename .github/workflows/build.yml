name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Debug

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout || 4 }}
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-gcc
            os: ubuntu-latest
            test: ./bin/test
          - name: ubuntu-clang
            os: ubuntu-latest
            args: '-DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_C_COMPILER=clang-18 -DCMAKE_C_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"'
            test: ./bin/test
          - name: ubuntu-clang-msan
            os: ubuntu-latest
            timeout: 10
            args: '-DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_C_COMPILER=clang-18 -DCMAKE_C_FLAGS="-fsanitize=memory -fsanitize-memory-track-origins=1 -fno-omit-frame-pointer" -DCMAKE_CXX_FLAGS="-fsanitize=memory -fsanitize-memory-track-origins=1 -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=memory"'
            test: ./bin/test
            msan-options: abort_on_error=1:halt_on_error=1
          - name: macos
            os: macos-latest
            args: -DBOX2D_SANITIZE=ON
            test: ./bin/test
          - name: windows
            os: windows-latest
            msvc: true
            args: -DBOX2D_SANITIZE=ON
            test: ./bin/Debug/test
          - name: windows-clang-cl-avx2
            os: windows-latest
            msvc: true
            args: -T ClangCL -DBOX2D_AVX2=ON
            test: ./bin/Debug/test
          - name: windows-arm64
            os: windows-11-arm
            args: -A arm64 -DBOX2D_DISABLE_SIMD=TRUE -DBOX2D_SANITIZE=ON
            test: ./bin/Debug/test
          - name: ubuntu-gcc-double
            os: ubuntu-latest
            args: -DBOX2D_DOUBLE_PRECISION=ON
            test: ./bin/test
          - name: windows-double
            os: windows-latest
            msvc: true
            args: -DBOX2D_DOUBLE_PRECISION=ON -DBOX2D_SANITIZE=ON
            test: ./bin/Debug/test
    steps:
    - uses: actions/checkout@v6

    - name: Setup MSVC dev command prompt
      if: ${{ matrix.msvc }}
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBOX2D_SAMPLES=OFF -DBUILD_SHARED_LIBS=OFF -DBOX2D_VALIDATE=ON -DCMAKE_COMPILE_WARNING_AS_ERROR=ON ${{ matrix.args }}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      env:
        MSAN_OPTIONS: ${{ matrix.msan-options }}
      run: ${{ matrix.test }}

  build-windows-mingw:
    name: windows-mingw
    runs-on: windows-latest
    timeout-minutes: 4
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6

    - name: Setup MSYS2 UCRT64
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja

    - name: Configure CMake
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBOX2D_SAMPLES=OFF -DBUILD_SHARED_LIBS=OFF -DBOX2D_VALIDATE=ON -DCMAKE_COMPILE_WARNING_AS_ERROR=ON

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: build
      run: ./bin/test

  samples:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 6
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: samples-ubuntu-gcc-static
            os: ubuntu-latest
            linux-deps: true
            args: -DBUILD_SHARED_LIBS=OFF
          - name: samples-macos-static
            os: macos-latest
            args: -DBUILD_SHARED_LIBS=OFF
          - name: samples-macos-dynamic
            os: macos-latest
            args: -DBUILD_SHARED_LIBS=ON
          - name: samples-windows-static
            os: windows-latest
            msvc: true
            args: -DBUILD_SHARED_LIBS=OFF
          - name: samples-windows-double
            os: windows-latest
            msvc: true
            args: -DBOX2D_DOUBLE_PRECISION=ON -DBUILD_SHARED_LIBS=OFF
          - name: samples-windows-dynamic
            os: windows-latest
            msvc: true
            args: -DBUILD_SHARED_LIBS=ON
    steps:
    - uses: actions/checkout@v6

    - name: Setup MSVC dev command prompt
      if: ${{ matrix.msvc }}
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: Install X11, Wayland, GL & GTK development libraries
      if: ${{ matrix.linux-deps }}
      run: sudo apt-get update && sudo apt-get install -y libx11-dev wayland-protocols libwayland-dev libxkbcommon-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev libgtk-3-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DBOX2D_SAMPLES=ON -DBOX2D_UNIT_TESTS=OFF ${{ matrix.args }}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release
